# ─────────────────────────────────────────────
# PM2.5 Forecasting — Configuration
# ─────────────────────────────────────────────

paths:
  # Kaggle paths (used when /kaggle exists)
  data:       "/kaggle/input/datasets/khushisingh942004/aisehack"
  temp:       "/kaggle/temp"
  model_save: "/kaggle/temp/best_model.pt"
  output:     "/kaggle/working/preds.npy"
  # Local paths (auto-applied in config.py when not on Kaggle)
  data_local: "/home/raj/Documents/CODING/Hackathon/ANRF_AISEHack_Code/aisehack-theme-2"

features:
  met:  ["u10", "v10", "pblh", "rain", "t2", "q2"]
  emis: ["PM25"]
  aux:  ["lat", "lon", "hour_sin", "hour_cos", "doy_sin", "doy_cos"]
  use_aux: false
  # Feature list = ["cpm25"] + met + emis  →  8 features total

time:
  t_in_cpm: 10    # cpm25 history hours available at test time
  t_in_met: 26    # met/emis input window (10 past + 16 NWP forecast)
  t_out:    16    # forecast horizon
  stride_train: 2
  stride_val:   4

data:
  months:      ["APRIL_16", "JULY_16", "OCT_16", "DEC_16"]
  val_month:   "OCT_16"
  test_samples: 996

preprocessing:
  cpm25_log1p: true
  cpm25_grid_zscore: true
  cpm25_grid_eps: 1.0e-6

# ── Persistence baseline (from EDA) — values in *normalized* [0,1] space ──
persistence:
  rmse_normalized: 0.0208   # avg RMSE at t+16
  rmse_physical:   30.83    # µg/m³  (threshold model must beat)

model:
  type:    "res_stunet"  # advanced run primary model
  # U-Net settings
  base_ch: 96
  # TFNO2D settings (fallback)
  width:   64
  modes:   20
  depth:   6
  # Residual spatiotemporal U-Net settings
  stem_ch: 64
  dropout: 0.08
  drop_path: 0.04
  use_se: true
  use_context_pyramid: true

models:
  tfno2d:
    width: 64
    modes: 20
    depth: 6
  unet:
    base_ch: 64
  res_stunet:
    base_ch: 96
    stem_ch: 64
    dropout: 0.08
    drop_path: 0.04
    use_se: true
    use_context_pyramid: true

training:
  epochs:           60
  patience:         8          # early-stopping epochs without val improvement
  batch_size_train: 4
  batch_size_val:   8
  batch_size_test:  16
  lr:               1.0e-3
  weight_decay:     1.0e-4
  pct_start:        0.1        # OneCycleLR warmup fraction
  grad_clip:        1.0
  num_workers:      2
  pin_memory:       true
  seed:             42
  use_amp:          true
  use_weighted_sampler: true
  default_sampling_weight: 1.0
  checkpoint_metric: mixed
  checkpoint_mixed_alpha: 0.7
  month_sampling_weights:
    APRIL_16: 0.5
    JULY_16: 0.5
    OCT_16: 1.0
    DEC_16: 3.0

loss:
  type: log_rmse
  horizon_weight_min: 0.8
  horizon_weight_max: 1.4
  rmse_weight: 0.8
  mae_weight: 0.2
  intensity_weighted: true
  intensity_alpha: 1.5
  intensity_ref: 59.0
  intensity_cap: 3.0
  phase_switch_epoch: 20
  phase2_mode: weighted_mae_phys

inference:
  use_tta: true
  tta_modes: ["identity", "hflip", "vflip", "hvflip"]
  model_paths: []
